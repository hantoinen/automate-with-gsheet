name: Run Bright Books ETL

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' 

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt




    - name: Debug secrets presence
      env:
        SHEET_ID: ${{ secrets.SHEET_ID }}
        WORKSHEET: ${{ secrets.WORKSHEET }}
      run: |
        echo "SHEET_ID length: ${#SHEET_ID}"
        echo "WORKSHEET length: ${#WORKSHEET}"



    - name: Run ETL Script
      env:
        # Google Sheets
        SHEET_ID: ${{ secrets.SHEET_ID }}
        WORKSHEET: ${{ secrets.WORKSHEET }}
        GOOGLE_SA_KEY_JSON: ${{ secrets.GOOGLE_SA_KEY_JSON }}

        # PostgreSQL (Liaison directe)
        PG_HOST: ${{ secrets.DB_HOST }} # 👈 Python attend PG_HOST, ton secret s'appelle DB_HOST
        PG_USER: ${{ secrets.PG_USER }}
        PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        PG_PORT: ${{ secrets.PG_PORT }}
        PG_DB: ${{ secrets.PG_DB }}
        PG_TABLE: ${{ secrets.PG_TABLE }}
      run: |
        python etl.py