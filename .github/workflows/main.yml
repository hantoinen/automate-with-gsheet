name: Run Bright Books ETL

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' 

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ETL Script
      env:
        # Google Sheets (Variables)
        SHEET_ID: ${{ vars.SHEET_ID }}
        WORKSHEET: ${{ vars.WORKSHEET }}
        GOOGLE_SA_KEY_JSON: ${{ secrets.GOOGLE_SA_KEY_JSON }}

        # PostgreSQL
        PG_HOST: ${{ secrets.DB_HOST }}
        PG_USER: ${{ vars.PG_USER }}
        PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        PG_PORT: ${{ vars.PG_PORT }}
        PG_DB: ${{ vars.PG_DB }}
        PG_TABLE: ${{ vars.PG_TABLE }}
      run: |
        python etl.py
